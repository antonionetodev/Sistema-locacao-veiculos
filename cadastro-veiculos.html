<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Veículo - AutoDrive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">🚗 AutoDrive</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-cliente.html">Cadastrar Cliente</a></li>
                    <li class="nav-item"><a class="nav-link" href="listagem-cliente.html">Lista de Clientes</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cadastro-veiculo.html">Cadastrar Veículo</a></li>
                    <li class="nav-item"><a class="nav-link" href="listagem-veiculo.html">Lista de Veículos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="card shadow-sm p-4 mx-auto" style="max-width: 600px;">
            <h2 class="text-center mb-4">🚗 Cadastro de Veículo</h2>
            <form>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="marca" class="form-label">Marca</label>
                        <input type="text" class="form-control" id="marca" placeholder="Ex: Chevrolet" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="modelo" class="form-label">Modelo</label>
                        <input type="text" class="form-control" id="modelo" placeholder="Ex: Onix" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="ano" class="form-label">Ano</label>
                        <input type="number" class="form-control" id="ano" placeholder="Ex: 2023" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="placa" class="form-label">Placa</label>
                        <input type="text" class="form-control" id="placa" placeholder="ABC1D23" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="diaria" class="form-label">Valor da Diária (R$)</label>
                    <input type="number" step="0.01" class="form-control" id="diaria" placeholder="0.00" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Salvar Veículo</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
